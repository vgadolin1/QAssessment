<!DOCTYPE html>
<html>
<head>
  <title>MiniShop</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    .product { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
    .btn { padding: 5px 10px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>MiniShop</h1>

  <div>
    <label>Search: <input id="search" /></label>
    <button class="btn" id="searchBtn">Search</button>
    <button class="btn" id="sortPriceBtn">Sort by price</button>
  </div>

  <div id="productList"></div>

  <h2>Cart</h2>
  <div id="cart"></div>
  <div>Total: $<span id="total">0</span></div>
  <button class="btn" id="checkoutBtn">Go to checkout</button>

  <div id="checkout" style="margin-top:30px; border-top:1px solid #ccc; padding-top:10px;">
    <h2>Checkout</h2>
    <label>Email: <input id="email" /></label><br/>
    <label>Credit card: <input id="card" /></label><br/>
    <button class="btn" id="placeOrderBtn">Place order</button>
    <div id="message"></div>
  </div>

  <script>
    const products = [
      { id: 1, name: 'Phone', price: 199, stock: 0 },
      { id: 2, name: 'Laptop', price: 999, stock: 5 },
      { id: 3, name: 'Headphones', price: 49, stock: 10 }
    ];

    let cart = [];

    function renderProducts(list) {
      const container = document.getElementById('productList');
      container.innerHTML = '';
      list.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `
          <strong>${p.name}</strong><br/>
          Price: $${p.price}<br/>
          Stock: <span>${p.stock > -1 ? 'In stock' : 'Out of stock'}</span><br/>
          <button class="btn addBtn" data-id="${p.id}">Add to cart</button>
        `;
        container.appendChild(div);
      });
      document.querySelectorAll('.addBtn').forEach(btn => {
        btn.addEventListener('click', e => {
          const id = Number(e.target.getAttribute('data-id'));
          const product = products.find(p => p.id === id);
          // Intentional bug: sometimes add 2
          cart.push(product);
          if (Math.random() > 0.5) cart.push(product);
          renderCart();
        });
      });
    }

    function renderCart() {
      const container = document.getElementById('cart');
      container.innerHTML = '';
      let total = 0;
      cart.forEach((item, index) => {
        total += item.price;
        const div = document.createElement('div');
        div.innerHTML = `
          ${item.name} - $${item.price}
          <button class="btn removeBtn" data-index="${index}">Remove</button>
        `;
        container.appendChild(div);
      });
      document.querySelectorAll('.removeBtn').forEach(btn => {
        btn.addEventListener('click', e => {
          const idx = Number(e.target.getAttribute('data-index'));
          cart.splice(idx, 1);
          // Intentional bug: not updating total here
          renderCart();
        });
      });
      document.getElementById('total').innerText = total;
    }

    document.getElementById('searchBtn').addEventListener('click', () => {
      const q = document.getElementById('search').value;
      // Intentional bug: case-sensitive search
      const filtered = products.filter(p => p.name.includes(q));
      renderProducts(filtered);
    });

    document.getElementById('sortPriceBtn').addEventListener('click', () => {
      // Intentional bug: sort as strings
      const sorted = [...products].sort((a, b) => ('' + a.price).localeCompare('' + b.price));
      renderProducts(sorted);
    });

    document.getElementById('placeOrderBtn').addEventListener('click', () => {
      const email = document.getElementById('email').value;
      const card = document.getElementById('card').value;
      const msg = document.getElementById('message');

      // Intentional bugs: weak validation
      if (!email || !card) {
        msg.innerText = 'Something went wrong';
        return;
      }

      msg.innerText = 'Order placed successfully';
      // Intentional bug: cart not cleared
    });

    renderProducts(products);
    renderCart();
  </script>
</body>
</html>
